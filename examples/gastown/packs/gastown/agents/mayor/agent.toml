scope = "city"
wake_mode = "fresh"
work_dir = ".gc/agents/mayor"
nudge = "Check mail and hook status, then act accordingly."
idle_timeout = "1h"
max_active_sessions = 1
work_query = """sh -c 'gc emergency list --format hook-injection --limit 20 2>/dev/null || true; for id in "$GC_SESSION_ID" "$GC_SESSION_NAME" "$GC_ALIAS"; do [ -z "$id" ] && continue; r=$(bd list --status in_progress --assignee="$id" --exclude-type=epic --json --limit=1 2>/dev/null); [ -n "$r" ] && [ "$r" != "[]" ] && printf "%s" "$r" && exit 0; done; for id in "$GC_SESSION_ID" "$GC_SESSION_NAME" "$GC_ALIAS"; do [ -z "$id" ] && continue; r=$(bd ready --assignee="$id" --exclude-type=epic --json --limit=1 2>/dev/null); [ -n "$r" ] && [ "$r" != "[]" ] && printf "%s" "$r" && exit 0; done; case "$GC_SESSION_ORIGIN" in ephemeral|"") ;; *) exit 0 ;; esac; r=$(bd ready --metadata-field gc.routed_to={{.Agent}} --unassigned --exclude-type=epic --json --limit=1 2>/dev/null); [ -n "$r" ] && [ "$r" != "[]" ] && printf "%s" "$r" && exit 0; printf "[]"'"""
